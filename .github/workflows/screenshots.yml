name: Screenshots

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Generate templ files
        run: go tool templ generate

      - name: Build application
        run: go build -o harmony .

      - name: Start application
        run: |
          SERVER_LISTEN_PORT=8080 ./harmony -env production &
          echo "APP_PID=$!" >> $GITHUB_ENV

      - name: Capture screenshots and recordings
        run: node scripts/screenshots.mjs --base-url http://localhost:8080

      - name: Stop application
        if: always()
        run: kill $APP_PID 2>/dev/null || true

      - uses: actions/upload-artifact@v6
        with:
          name: screenshots
          path: docs/screenshots/
