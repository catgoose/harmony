name: Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  screenshots:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Generate templ files
        run: go tool templ generate

      - name: Build application
        run: go build -o harmony .

      - name: Start application
        run: |
          SERVER_LISTEN_PORT=8080 ./harmony -env production &
          echo "APP_PID=$!" >> $GITHUB_ENV

      - name: Capture screenshots and recordings
        run: node scripts/screenshots.mjs --base-url http://localhost:8080

      - name: Stop application
        if: always()
        run: kill $APP_PID 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots/

  publish:
    runs-on: ubuntu-latest
    needs: [screenshots]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: output

      - name: Checkout screenshots repo
        uses: actions/checkout@v4
        with:
          repository: catgoose/screenshots
          token: ${{ secrets.SCREENSHOTS_REPO_TOKEN }}
          path: screenshots-repo

      - name: Copy and push screenshots
        run: |
          mkdir -p screenshots-repo/harmony
          cp -r output/* screenshots-repo/harmony/
          cd screenshots-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add harmony
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update harmony screenshots"
          git pull --rebase origin main
          git push
        env:
          GH_TOKEN: ${{ secrets.SCREENSHOTS_REPO_TOKEN }}
