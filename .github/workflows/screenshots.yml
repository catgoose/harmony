name: Screenshots

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Generate templ files
        run: go tool templ generate

      - name: Build application
        run: go build -o go-htmx-demo .

      - name: Start application
        run: |
          SERVER_LISTEN_PORT=8080 ./go-htmx-demo &
          echo "APP_PID=$!" >> $GITHUB_ENV

      - name: Capture screenshots and recordings
        run: node scripts/screenshots.mjs --base-url http://localhost:8080

      - name: Stop application
        if: always()
        run: kill $APP_PID 2>/dev/null || true

      - name: Convert recordings to GIFs
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          cd docs/screenshots/videos
          for f in *.webm; do
            [ -f "$f" ] || continue
            name="${f%.webm}"
            # Two-pass: generate palette for better quality
            ffmpeg -y -i "$f" \
              -vf "fps=15,scale=960:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=128[p];[s1][p]paletteuse=dither=bayer" \
              "../${name}.gif" \
              -loglevel error
            echo "Converted ${f} -> ${name}.gif"
          done

      - name: Clean up video files
        run: rm -rf docs/screenshots/videos

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots/

  publish:
    runs-on: ubuntu-latest
    needs: [screenshots]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: screenshots
          path: output

      - name: Checkout screenshots repo
        uses: actions/checkout@v4
        with:
          repository: catgoose/screenshots
          token: ${{ secrets.SCREENSHOTS_REPO_TOKEN }}
          path: screenshots-repo

      - name: Copy and push screenshots
        run: |
          mkdir -p screenshots-repo/go-htmx-demo
          cp -r output/* screenshots-repo/go-htmx-demo/
          cd screenshots-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add go-htmx-demo
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update go-htmx-demo screenshots"
          git pull --rebase origin main
          git push
        env:
          GH_TOKEN: ${{ secrets.SCREENSHOTS_REPO_TOKEN }}
