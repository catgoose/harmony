name: iOS Build

on:
  push:
    branches: [feat/capacitor, feat/ios-demo-build]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm ci

      - name: Generate templ files
        run: go tool templ generate

      - name: Prepare web assets for Capacitor
        run: |
          # Create the webDir that capacitor.config.ts expects
          mkdir -p build/web/assets/public
          # Copy all public assets (CSS, JS, images, service worker)
          cp -r web/assets/public/* build/web/assets/public/

      - name: Configure Capacitor for bundled mode
        run: |
          # Remove server.url so Capacitor serves from webDir instead of localhost
          sed -i '' '/server:/,/},/d' capacitor.config.ts

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Verify iOS project
        run: |
          echo "Checking iOS project structure..."
          ls -la ios/App/
          ls -la ios/App/App.xcworkspace || echo "WARNING: xcworkspace not found"
          ls -la ios/App/Podfile || echo "WARNING: Podfile not found"

      - name: Install CocoaPods (if Podfile exists)
        run: |
          if [ -f ios/App/Podfile ]; then
            cd ios/App
            pod install --repo-update
          else
            echo "No Podfile found, skipping CocoaPods"
          fi

      - name: Build for simulator
        run: |
          set -eo pipefail
          cd ios/App

          # Use workspace if CocoaPods created one, otherwise use project
          if [ -d "App.xcworkspace" ]; then
            echo "Building with workspace..."
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 16' \
              -derivedDataPath "$GITHUB_WORKSPACE/build/ios-derived" \
              CODE_SIGNING_ALLOWED=NO \
              build
          else
            echo "Building with project..."
            xcodebuild \
              -project App.xcodeproj \
              -scheme App \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 16' \
              -derivedDataPath "$GITHUB_WORKSPACE/build/ios-derived" \
              CODE_SIGNING_ALLOWED=NO \
              build
          fi

      - name: Package simulator app
        run: |
          echo "Searching for .app bundle..."
          find "$GITHUB_WORKSPACE/build/ios-derived" -name "*.app" -type d || true
          APP_PATH=$(find "$GITHUB_WORKSPACE/build/ios-derived" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app bundle not found"
            echo "Build directory contents:"
            find "$GITHUB_WORKSPACE/build/ios-derived" -type d -maxdepth 6 2>/dev/null || echo "build/ios-derived does not exist"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/harmony-simulator.zip" "$(basename "$APP_PATH")"
          ls -lh "$GITHUB_WORKSPACE/harmony-simulator.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: harmony-ios-simulator
          path: harmony-simulator.zip
          retention-days: 30

      - name: Create release (on manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-dev-${{ github.run_number }}
          name: "iOS Simulator Build #${{ github.run_number }}"
          body: |
            Unsigned simulator build of the harmony demo iOS app.

            This is a development build — it runs in the iOS Simulator only, not on physical devices.
            To install: unzip and drag into a running iOS Simulator.

            For physical device builds, code signing certificates are required.
          files: harmony-simulator.zip
          prerelease: true

  notify-failure:
    if: ${{ failure() }}
    needs: [build-simulator]
    runs-on: ubuntu-latest
    steps:
      - name: Notify CI failure
        run: |
          TITLE="CI: ${{ github.workflow }} failure"
          BODY="**Workflow:** \`${{ github.workflow }}\`
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Branch:** \`${{ github.ref_name }}\`
          **Commit:** \`${{ github.sha }}\`
          **Triggered by:** ${{ github.actor }}"

          ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "ci" \
            --state open \
            --search "in:title $TITLE" \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$ISSUE" ]; then
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --label "ci" \
              --body "$BODY"
          else
            gh issue comment "$ISSUE" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  notify-success:
    if: ${{ success() }}
    needs: [build-simulator]
    runs-on: ubuntu-latest
    steps:
      - name: Close CI issue on success
        run: |
          TITLE="CI: ${{ github.workflow }} failure"
          ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --label "ci" \
            --state open \
            --search "in:title $TITLE" \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$ISSUE" ]; then
            gh issue close "$ISSUE" \
              --repo "${{ github.repository }}" \
              --comment "${{ github.workflow }} is green again. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
